version: "3.8"

services:
  # Service API FastAPI – Access Gate
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-access-gate-api
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      core-mock:
        condition: service_healthy
    networks:
      - team-internal
      - class-net
    ports:
      - "${APP_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # PostgreSQL database
  db:
    image: postgres:15-alpine
    container_name: fit4110-access-gate-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab05}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lab05pass}
      POSTGRES_DB: ${POSTGRES_DB:-access_gate_db}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lab05}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mock Core Business (thay thế cho AI service)
  core-mock:
    build:
      context: ./src/core_mock
      dockerfile: Dockerfile
    container_name: fit4110-core-mock
    networks:
      - team-internal
    ports:
      - "9000:9000"   # để test riêng nếu cần
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

networks:
  team-internal:
    driver: bridge
  class-net:
    external: true

volumes:
  db-data: